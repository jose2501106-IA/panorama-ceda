name: Actualizar factores externos

on:
  schedule:
    # 09:30 UTC = 3:30 am CDMX — listo antes de la captura de José.
    # Para hacerlo cada hora algún día: '30 * * * *'
    - cron: '30 9 * * *'
  workflow_dispatch: {}   # permite correrlo a mano desde la pestaña Actions

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install requests

      - name: Consultar fuentes y actualizar datos
        run: python scripts/actualiza_factores.py

      - name: Commit y push si hubo cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add datos/factores_auto.json datos/ceda.db
          git diff --cached --quiet || git commit -m "auto: factores externos $(date -u +%F)"
          git push
